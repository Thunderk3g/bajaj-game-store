<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Balance Blade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #00091A;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #root, .game-wrap {
      width: 100%;
      height: var(--app-height, 100vh);
      min-height: var(--app-height, 100vh);
    }
    #root { display: flex; justify-content: center; }
    .game-wrap { max-width: 480px; overflow: hidden; position: relative; }
    .screen-scroll {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    input, select { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #003DA6; border-radius: 2px; }
    .btn-press:active { transform: scale(0.94); }

    @keyframes pop { 0%{transform:scale(0.7);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes popup-rise {
      0%   { transform: translateY(0);     opacity: 1; }
      100% { transform: translateY(-50px); opacity: 0; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-5px); }
      40%      { transform: translateX(5px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .popup-float { animation: popup-rise 0.9s ease-out forwards; pointer-events: none; }
    .shake       { animation: shake 0.35s ease-in-out; }

    /* Fruit ninja item slice animation */
    @keyframes item-slice {
      0%   { transform: scale(1) rotate(0deg);   opacity: 1; }
      30%  { transform: scale(1.45) rotate(25deg); opacity: 0.8; }
      70%  { transform: scale(0.5) rotate(50deg);  opacity: 0.3; }
      100% { transform: scale(0.05) rotate(80deg); opacity: 0; }
    }

    /* Slash burst on hit */
    @keyframes slice-burst {
      0%   { transform: scale(0.4); opacity: 0.9; }
      50%  { transform: scale(1.2); opacity: 0.5; }
      100% { transform: scale(2.0); opacity: 0; }
    }

    /* Tutorial animations */

    /* Good item: flies up, bursts when finger crosses at ~42% */
    @keyframes tut-fruit-good {
      0%, 100%  { bottom: -18%; opacity: 0; transform: scale(0.35) rotate(-10deg); }
      10%       { bottom:  6%;  opacity: 1; transform: scale(1)    rotate(0deg); }
      36%       { bottom: 50%;  opacity: 1; transform: scale(1)    rotate(6deg); }
      42%       { bottom: 52%;  opacity: 1; transform: scale(1.55) rotate(12deg); }
      50%       { bottom: 58%;  opacity: 0; transform: scale(0.05) rotate(40deg); }
      55%, 99%  { opacity: 0; bottom: 60%; }
    }
    /* Bad item: flies up alone in second half — no swipe near it */
    @keyframes tut-fruit-bad {
      0%, 56%, 100% { bottom: -18%; opacity: 0; transform: scale(0.35) rotate(8deg); }
      64%  { bottom: 8%;  opacity: 1; transform: scale(1)   rotate(0deg); }
      78%  { bottom: 48%; opacity: 1; transform: scale(1)   rotate(-6deg); }
      86%  { bottom: 54%; opacity: 1; transform: scale(1)   rotate(-10deg); }
      94%  { bottom: 36%; opacity: 0; transform: scale(0.5) rotate(-20deg); }
    }
    /* Finger touch-point sweeps diagonally bottom-left → top-right through good item */
    @keyframes tut-finger {
      0%, 14%, 100% { transform: translate(0, 0) scale(0.35); opacity: 0; }
      19%           { transform: translate(0, 0) scale(1);    opacity: 1; }
      42%           { transform: translate(62px, -56px) scale(1);    opacity: 1; }
      50%           { transform: translate(80px, -68px) scale(0.65); opacity: 0; }
      55%, 99%      { opacity: 0; }
    }
    /* Ripple ring expands from finger on contact */
    @keyframes tut-ripple {
      0%, 14%, 55%, 100% { transform: scale(1); opacity: 0; }
      20%  { transform: scale(1);   opacity: 0.7; }
      32%  { transform: scale(2.2); opacity: 0; }
      42%  { transform: scale(1);   opacity: 0.9; }
      50%  { transform: scale(2.8); opacity: 0; }
    }
    /* Swipe trail grows from finger origin toward the item */
    @keyframes tut-trail-scale {
      0%, 19%   { transform: rotate(-42deg) scaleX(0);    opacity: 0; }
      26%       { transform: rotate(-42deg) scaleX(0.12); opacity: 0.65; }
      42%       { transform: rotate(-42deg) scaleX(1);    opacity: 0.85; }
      52%       { transform: rotate(-42deg) scaleX(1);    opacity: 0; }
      55%, 100% { opacity: 0; }
    }
    /* Score popup after slice */
    @keyframes tut-score-good {
      0%, 42%, 100% { opacity: 0; transform: translateY(0); }
      47%  { opacity: 1; transform: translateY(0); }
      66%  { opacity: 1; transform: translateY(-1.1rem); }
      74%  { opacity: 0; transform: translateY(-1.6rem); }
    }
    /* AVOID label near bad item */
    @keyframes tut-avoid-label {
      0%, 62%, 100% { opacity: 0; }
      70%  { opacity: 1; }
      84%  { opacity: 1; }
      92%  { opacity: 0; }
    }
    @keyframes tut-bg-glow {
      0%,100% { opacity: 0.15; }
      50%      { opacity: 0.3; }
    }

    .tutorial-fruit {
      position: absolute;
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tutorial-fruit-good {
      left: 22%;
      background: radial-gradient(circle at 38% 32%, #22C55Ecc, #22C55Eaa);
      box-shadow: 0 0 1rem #22C55E60;
      animation: tut-fruit-good 4.2s ease-in-out infinite;
    }
    .tutorial-fruit-bad {
      right: 18%;
      background: radial-gradient(circle at 38% 32%, #DC2626cc, #DC2626aa);
      box-shadow: 0 0 1rem #DC262660;
      animation: tut-fruit-bad 4.2s ease-in-out infinite;
    }
    /* Swipe trail line grows along finger path */
    .tutorial-swipe-trail {
      position: absolute;
      left: 7%;
      bottom: 14%;
      width: 30%;
      height: 0.18rem;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent 0%, rgba(160,215,255,0.6) 35%, white 100%);
      transform-origin: left center;
      animation: tut-trail-scale 4.2s ease-in-out infinite;
    }
    /* Finger touch-point circle */
    .tutorial-finger {
      position: absolute;
      left: 6%;
      bottom: 12%;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.95), rgba(200,230,255,0.85));
      box-shadow: 0 0 0.55rem rgba(200,225,255,0.9), 0 0 1.2rem rgba(130,190,255,0.5);
      animation: tut-finger 4.2s ease-in-out infinite;
    }
    .tutorial-finger::after {
      content: '';
      position: absolute;
      inset: -0.25rem;
      border-radius: 50%;
      border: 1.5px solid rgba(200,230,255,0.7);
      animation: tut-ripple 4.2s ease-in-out infinite;
    }
    .tutorial-score-good {
      position: absolute;
      left: 20%;
      top: 22%;
      color: #86EFAC;
      font-weight: 800;
      font-size: 0.78rem;
      text-shadow: 0 0.1rem 0.4rem rgba(0,0,0,0.8);
      animation: tut-score-good 4.2s ease-in-out infinite;
    }
    .tutorial-avoid-label {
      position: absolute;
      right: 14%;
      top: 18%;
      color: #FCA5A5;
      font-weight: 800;
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      text-shadow: 0 0.1rem 0.4rem rgba(0,0,0,0.9);
      animation: tut-avoid-label 4.2s ease-in-out infinite;
    }
    .tutorial-bg-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(242,101,34,0.12) 0%, transparent 70%);
      animation: tut-bg-glow 4.2s ease-in-out infinite;
    }
  </style>
  <script>
    (() => {
      const syncAppHeight = () => {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${h}px`);
      };
      syncAppHeight();
      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', syncAppHeight);
    })();
  </script>
  <script type="module" crossorigin src="./index.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
