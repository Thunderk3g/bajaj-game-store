<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Guardian Grid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #001230;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #root, .game-wrap {
      width: 100%;
      height: var(--app-height, 100vh);
      min-height: var(--app-height, 100vh);
    }
    #root { display: flex; justify-content: center; }
    .game-wrap { max-width: 480px; overflow: hidden; position: relative; }
    .screen-scroll {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    input, select { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #003DA6; border-radius: 2px; }
    .btn-press:active { transform: scale(0.94); }

    @keyframes pop { 0%{transform:scale(0.7);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-5px); }
      40%      { transform: translateX(5px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(40,167,69,0.4); }
      50%      { box-shadow: 0 0 0 8px rgba(40,167,69,0); }
    }

    .shake       { animation: shake 0.35s ease-in-out; }
    .pulse-green { animation: pulse-green 1s ease-in-out infinite; }

    @keyframes ticker-slide {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .ticker { animation: ticker-slide 12s linear infinite; white-space: nowrap; }

    @keyframes tutorial-place {
      0%, 59% { transform: translate(-2.1rem, 0rem) scale(0.9); opacity: 0; }
      60%, 85% { transform: translate(-2.1rem, 0rem) scale(1); opacity: 1; }
      95% { transform: translate(-2.1rem, 0rem) scale(1); opacity: 0; }
      100% { transform: translate(-2.1rem, 0rem) scale(0.9); opacity: 0; }
    }
    @keyframes wrong-cell-blink {
      0%, 26%, 42%, 100% { background: rgba(15,23,42,0.72); }
      27%, 31%, 35%, 39% { background: rgba(239,68,68,0.75); }
      29%, 33%, 37%, 41% { background: rgba(239,68,68,0.25); }
    }
    .tutorial-wrong-cell {
      animation: wrong-cell-blink 8s ease-in-out infinite;
    }
    @keyframes game-wrong-blink-anim {
      0%, 100% { background: rgba(3,7,18,0.62); }
      25%, 75% { background: rgba(239,68,68,0.85); box-shadow: 0 0 15px rgba(239,68,68,0.8); }
      50% { background: rgba(239,68,68,0.3); }
    }
    .game-wrong-cell {
      animation: game-wrong-blink-anim 0.8s ease-in-out;
    }
    @keyframes existing-duplicate-blink {
      0%, 26%, 42%, 100% { background: rgba(15,23,42,0.85); }
      27%, 31%, 35%, 39% { background: rgba(239,68,68,0.75); }
      29%, 33%, 37%, 41% { background: rgba(15,23,42,0.85); }
    }
    .tutorial-existing-dup {
      animation: existing-duplicate-blink 8s ease-in-out infinite;
    }
    @keyframes correct-cell-glow {
      0%, 63%, 95%, 100% { background: rgba(15,23,42,0.72); }
      64%, 88% { background: rgba(34,197,94,0.72); }
    }
    .tutorial-correct-cell {
      animation: correct-cell-glow 8s ease-in-out infinite;
    }
    @keyframes check-text-update {
      0%, 10%, 100% { content: "Select cell..."; color: #38bdf8; opacity: 0; }
      12%, 24% { content: "Select cell..."; color: #38bdf8; opacity: 1; }
      25%, 32% { content: "Placing tile..."; color: #38bdf8; opacity: 1; }
      33%, 43% { content: "Row Duplicate! ⚠️"; color: #f87171; opacity: 1; }
      44%, 55% { content: "Select cell..."; color: #38bdf8; opacity: 1; }
      56%, 63% { content: "Placing tile..."; color: #38bdf8; opacity: 1; }
      64%, 88% { content: "Shield locked! ✅"; color: #86efac; opacity: 1; }
    }
    @keyframes tutorial-hand-anim {
      0% { transform: translate(4.5rem, 11.5rem) scale(1); opacity: 0; }
      5% { transform: translate(4.5rem, 11.5rem) scale(1); opacity: 1; }
      15% { transform: translate(-1.675rem, 4.625rem) scale(1); opacity: 1; }
      17% { transform: translate(-1.675rem, 4.625rem) scale(0.7); opacity: 1; }
      19% { transform: translate(-1.675rem, 4.625rem) scale(1); opacity: 1; }
      24% { transform: translate(-1.675rem, 11.475rem) scale(1); opacity: 1; }
      26% { transform: translate(-1.675rem, 11.475rem) scale(0.7); opacity: 1; }
      28% { transform: translate(-1.675rem, 11.475rem) scale(1); opacity: 1; }
      43% { transform: translate(-1.675rem, 0.425rem) scale(1); opacity: 1; }
      45% { transform: translate(-1.675rem, 0.425rem) scale(0.7); opacity: 1; }
      47% { transform: translate(-1.675rem, 0.425rem) scale(1); opacity: 1; }
      57% { transform: translate(-1.675rem, 11.475rem) scale(1); opacity: 1; }
      59% { transform: translate(-1.675rem, 11.475rem) scale(0.7); opacity: 1; }
      61% { transform: translate(-1.675rem, 11.475rem) scale(1); opacity: 1; }
      70% { transform: translate(4.5rem, 11.5rem) scale(1); opacity: 1; }
      95% { transform: translate(4.5rem, 11.5rem) scale(1); opacity: 0; }
      100% { transform: translate(4.5rem, 11.5rem) scale(1); opacity: 0; }
    }
    .tutorial-hand {
      position: absolute;
      left: 50%;
      top: 0.7rem;
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.78);
      border: 0.16rem solid #fbbf24;
      box-shadow: 0 0 0.8rem #fbbf24;
      z-index: 40;
      pointer-events: none;
      opacity: 0;
      animation: tutorial-hand-anim 8s ease-in-out infinite;
    }
    @keyframes tutorial-selection-anim {
      0%, 15% { transform: translate(-2.1rem, 4.2rem) scale(0.9); opacity: 0; }
      17%, 45% { transform: translate(-2.1rem, 4.2rem) scale(1); opacity: 1; }
      46%, 51% { opacity: 0; }
      54%, 85% { transform: translate(-2.1rem, 0rem) scale(1); opacity: 1; }
      86%, 100% { opacity: 0; }
    }
    .tutorial-selection {
      position: absolute;
      left: 50%;
      top: 0.7rem;
      width: 2.1rem;
      height: 2.1rem;
      border: 3px solid #fbbf24;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.7), 0 0 1rem #fbbf24;
      border-radius: 0.35rem;
      pointer-events: none;
      z-index: 30;
      opacity: 0;
      animation: tutorial-selection-anim 8s cubic-bezier(0.34,1.56,0.64,1) infinite;
    }
    @keyframes icon-box-tap {
      0%, 23%, 37%, 59%, 65%, 100% { border-color: rgba(255,255,255,0.1); box-shadow: none; transform: scale(1) translateX(0); }
      24% { border-color: #fbbf24; box-shadow: 0 0 10px #fbbf24; transform: scale(0.94) translateX(0); }
      25%, 29%, 33% { border-color: #f87171; box-shadow: 0 0 10px #f87171; transform: scale(0.94) translateX(-3px); }
      27%, 31%, 35% { border-color: #f87171; box-shadow: 0 0 10px #f87171; transform: scale(0.94) translateX(3px); }
      60%, 64% { border-color: #fbbf24; box-shadow: 0 0 10px #fbbf24; transform: scale(0.94) translateX(0); }
    }
    .tutorial-icon-box-active {
      animation: icon-box-tap 8s ease-in-out infinite;
    }
    .tutorial-grid {
      position: absolute;
      left: 50%;
      top: 0.7rem;
      display: grid;
      width: 8.4rem;
      height: 8.4rem;
      transform: translateX(-50%);
      grid-template-columns: repeat(4, 1fr);
      overflow: hidden;
      border: 0.2rem solid rgba(207,250,254,0.55);
      border-radius: 0.85rem;
      background: rgba(2,6,23,0.65);
    }
    .tutorial-grid span {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1.2px solid rgba(207,250,254,0.2);
      border-bottom: 1.2px solid rgba(207,250,254,0.2);
      color: white;
      font-size: 0.64rem;
      font-weight: 800;
    }
    .tutorial-grid img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 0.18rem 0.25rem rgba(0,0,0,0.35));
    }
    .tutorial-fixed { background: rgba(15,23,42,0.85); }
    .tutorial-empty { background: rgba(15,23,42,0.72); }
    .tutorial-tile {
      position: absolute;
      left: 50%;
      top: 0.7rem;
      border-radius: 0.55rem;
      background: linear-gradient(145deg, #fbbf24, #14b8a6);
      padding: 0.25rem;
      width: 2.1rem;
      height: 2.1rem;
      box-shadow: 0 0 1rem rgba(45,212,191,0.45);
      animation: tutorial-place 8s ease-in-out infinite;
    }
    .tutorial-tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .tutorial-check {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 9.35rem;
      font-size: 0.8rem;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 0.15rem 0.45rem rgba(0,0,0,0.8);
      width: 100%;
    }
    .tutorial-check::before {
      content: "";
      animation: check-text-update 8s ease-in-out infinite;
    }
  </style>
  <script>
    (() => {
      const syncAppHeight = () => {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${h}px`);
      };
      syncAppHeight();
      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', syncAppHeight);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
