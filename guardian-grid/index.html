<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Guardian Grid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #001230;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #root, .game-wrap {
      width: 100%;
      height: var(--app-height, 100vh);
      min-height: var(--app-height, 100vh);
    }
    #root { display: flex; justify-content: center; }
    .game-wrap { max-width: 480px; overflow: hidden; position: relative; }
    .screen-scroll {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    input, select { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #003DA6; border-radius: 2px; }
    .btn-press:active { transform: scale(0.94); }

    @keyframes pop { 0%{transform:scale(0.7);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-5px); }
      40%      { transform: translateX(5px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(40,167,69,0.4); }
      50%      { box-shadow: 0 0 0 8px rgba(40,167,69,0); }
    }

    .shake       { animation: shake 0.35s ease-in-out; }
    .pulse-green { animation: pulse-green 1s ease-in-out infinite; }

    @keyframes ticker-slide {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .ticker { animation: ticker-slide 12s linear infinite; white-space: nowrap; }

    @keyframes tutorial-place {
      0%, 28%, 100% { transform: translate(7.8rem, 2.1rem) scale(0.92); opacity: 0; }
      40% { transform: translate(5.25rem, 3.45rem) scale(1.05); opacity: 1; }
      58%, 78% { transform: translate(3.4rem, 3.45rem) scale(0.9); opacity: 1; }
    }
    @keyframes tutorial-glow {
      0%, 54%, 100% { opacity: 0; transform: translateY(0.3rem); }
      65%, 84% { opacity: 1; transform: translateY(0); }
    }
    .tutorial-grid {
      position: absolute;
      left: 50%;
      top: 0.7rem;
      display: grid;
      width: 8.4rem;
      height: 8.4rem;
      transform: translateX(-50%);
      grid-template-columns: repeat(4, 1fr);
      overflow: hidden;
      border: 0.18rem solid rgba(207,250,254,0.45);
      border-radius: 0.85rem;
      background: rgba(2,6,23,0.65);
    }
    .tutorial-grid span {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid rgba(207,250,254,0.18);
      border-bottom: 1px solid rgba(207,250,254,0.18);
      color: white;
      font-size: 0.64rem;
      font-weight: 800;
    }
    .tutorial-grid img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 0.18rem 0.25rem rgba(0,0,0,0.35));
    }
    .tutorial-fixed { background: rgba(20,184,166,0.72); }
    .tutorial-empty { background: rgba(15,23,42,0.72); }
    .tutorial-tile {
      position: absolute;
      left: 50%;
      top: 0.35rem;
      border-radius: 0.55rem;
      background: linear-gradient(145deg, #fbbf24, #14b8a6);
      padding: 0.25rem;
      width: 2.55rem;
      height: 2.55rem;
      box-shadow: 0 0 1rem rgba(45,212,191,0.45);
      animation: tutorial-place 3.4s ease-in-out infinite;
    }
    .tutorial-tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .tutorial-check {
      position: absolute;
      right: 1rem;
      top: 1rem;
      color: #86EFAC;
      font-size: 0.72rem;
      font-weight: 800;
      text-shadow: 0 0.15rem 0.45rem rgba(0,0,0,0.8);
      animation: tutorial-glow 3.4s ease-in-out infinite;
    }
  </style>
  <script>
    (() => {
      const syncAppHeight = () => {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${h}px`);
      };
      syncAppHeight();
      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', syncAppHeight);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
