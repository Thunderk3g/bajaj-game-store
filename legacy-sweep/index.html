<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Legacy Sweep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #001230;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #root, .game-wrap {
      width: 100%;
      height: var(--app-height, 100vh);
      min-height: var(--app-height, 100vh);
    }
    #root { display: flex; justify-content: center; }
    .game-wrap { max-width: 480px; overflow: hidden; position: relative; }
    .screen-scroll {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    input, select { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #003DA6; border-radius: 2px; }
    .btn-press:active { transform: scale(0.94); }

    @keyframes pop { 0%{transform:scale(0.7);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .float { animation: float 3s ease-in-out infinite; }

    /* Mole animations */
    @keyframes mole-pop {
      0%   { transform: scale(0.1) translateY(20%); opacity: 0; }
      65%  { transform: scale(1.18) translateY(-6%); opacity: 1; }
      100% { transform: scale(1) translateY(0);      opacity: 1; }
    }
    @keyframes mole-smash {
      0%   { transform: scale(1)   rotate(0deg);  opacity: 1; }
      35%  { transform: scale(1.4) rotate(18deg); opacity: 1; }
      100% { transform: scale(0)   rotate(35deg); opacity: 0; }
    }
    @keyframes mole-duck {
      0%   { transform: scale(1)   translateY(0);   opacity: 1; }
      100% { transform: scale(0.2) translateY(30%); opacity: 0; }
    }
    @keyframes popup-rise {
      0%   { transform: translateY(0);    opacity: 1; }
      100% { transform: translateY(-45px); opacity: 0; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-5px); }
      40%      { transform: translateX(5px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(40,167,69,0.4); }
      50%      { box-shadow: 0 0 0 8px rgba(40,167,69,0); }
    }

    .mole-up     { animation: mole-pop   0.22s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .mole-whack  { animation: mole-smash 0.28s ease-out forwards; }
    .mole-hide   { animation: mole-duck  0.22s ease-in  forwards; }
    .popup-float { animation: popup-rise 0.8s  ease-out forwards; pointer-events: none; }
    .shake       { animation: shake 0.35s ease-in-out; }
    .pulse-green { animation: pulse-green 1s ease-in-out infinite; }

    @keyframes ticker-slide {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .ticker { animation: ticker-slide 12s linear infinite; white-space: nowrap; }

    @keyframes tutorial-pop-good {
      0%, 18%, 100% { transform: translateY(80%) scale(0.4); opacity: 0; }
      28%, 70% { transform: translateY(0) scale(1); opacity: 1; }
      80% { transform: translateY(16%) scale(0.7); opacity: 0; }
    }
    @keyframes tutorial-pop-bad {
      0%, 46%, 100% { transform: translateY(80%) scale(0.4); opacity: 0; }
      56%, 86% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes tutorial-hit {
      0%, 24%, 100% { transform: translate(120%, -28%) rotate(28deg); }
      38%, 52% { transform: translate(18%, 12%) rotate(-18deg); }
      66%, 86% { transform: translate(120%, -24%) rotate(28deg); }
    }
    @keyframes tutorial-score {
      0%, 38%, 100% { transform: translateY(0); opacity: 0; }
      48%, 66% { transform: translateY(-1.1rem); opacity: 1; }
    }
    .tutorial-hole {
      position: absolute;
      bottom: 1.15rem;
      width: 3.8rem;
      height: 3.8rem;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      box-shadow: 0 0 1rem rgba(255,255,255,0.18);
    }
    .tutorial-hole-good { left: 21%; background: #22C55E; animation: tutorial-pop-good 3.2s ease-in-out infinite; }
    .tutorial-hole-bad { right: 19%; background: #EF4444; animation: tutorial-pop-bad 3.2s ease-in-out infinite; }
    .tutorial-mallet {
      position: absolute;
      top: 1.1rem;
      left: 43%;
      width: 1rem;
      height: 5.2rem;
      border-radius: 999px;
      background: #FCD34D;
      transform-origin: 50% 100%;
      animation: tutorial-hit 3.2s ease-in-out infinite;
    }
    .tutorial-mallet::before {
      content: "";
      position: absolute;
      top: -0.65rem;
      left: -1.05rem;
      width: 3.1rem;
      height: 1.4rem;
      border-radius: 0.45rem;
      background: #F26522;
      box-shadow: inset 0 0.15rem 0 rgba(255,255,255,0.25);
    }
    .tutorial-score {
      position: absolute;
      left: 25%;
      top: 2rem;
      color: #86EFAC;
      font-weight: 800;
      text-shadow: 0 0.15rem 0.45rem rgba(0,0,0,0.8);
      animation: tutorial-score 3.2s ease-in-out infinite;
    }
  </style>
  <script>
    (() => {
      const syncAppHeight = () => {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${h}px`);
      };
      syncAppHeight();
      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', syncAppHeight);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
