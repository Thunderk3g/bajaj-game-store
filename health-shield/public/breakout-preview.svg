<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <!-- Scanline overlay for CRT effect -->
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="0" y="2" width="1" height="2" fill="rgba(0,0,0,0)"/>
    </pattern>
    <!-- Screen glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- CRT screen gradient -->
    <radialGradient id="screenBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0050"/>
      <stop offset="100%" stop-color="#060015"/>
    </radialGradient>
    <!-- Arcade cabinet gradient -->
    <linearGradient id="cabinetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="50%" stop-color="#2d1060"/>
      <stop offset="100%" stop-color="#1a0a3a"/>
    </linearGradient>
    <!-- Brick row gradients -->
    <linearGradient id="brick1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff5599"/>
      <stop offset="100%" stop-color="#cc1155"/>
    </linearGradient>
    <linearGradient id="brick2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8833"/>
      <stop offset="100%" stop-color="#cc5500"/>
    </linearGradient>
    <linearGradient id="brick3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffee22"/>
      <stop offset="100%" stop-color="#ccbb00"/>
    </linearGradient>
    <linearGradient id="brick4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#44ff44"/>
      <stop offset="100%" stop-color="#009900"/>
    </linearGradient>
    <linearGradient id="brick5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ddff"/>
      <stop offset="100%" stop-color="#0099bb"/>
    </linearGradient>
    <linearGradient id="brick6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cc88ff"/>
      <stop offset="100%" stop-color="#8833cc"/>
    </linearGradient>
    <!-- Paddle gradient -->
    <linearGradient id="paddleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#88ddff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>

  <!-- ─── CABINET BODY ─── -->
  <rect x="0" y="0" width="320" height="200" rx="8" fill="url(#cabinetGrad)"/>
  <!-- Side panels darker -->
  <rect x="0" y="0" width="24" height="200" rx="8" fill="rgba(0,0,0,0.35)"/>
  <rect x="296" y="0" width="24" height="200" rx="8" fill="rgba(0,0,0,0.35)"/>
  <!-- Cabinet edge lines -->
  <rect x="22" y="8" width="2" height="184" fill="rgba(191,90,242,0.4)" rx="1"/>
  <rect x="296" y="8" width="2" height="184" fill="rgba(191,90,242,0.4)" rx="1"/>

  <!-- ─── SCREEN BEZEL ─── -->
  <rect x="26" y="10" width="268" height="180" rx="6" fill="#110030" stroke="rgba(0,229,255,0.5)" stroke-width="1.5"/>

  <!-- ─── SCREEN CONTENT ─── -->
  <rect x="30" y="14" width="260" height="172" rx="4" fill="url(#screenBg)"/>

  <!-- Screen inner glow border -->
  <rect x="30" y="14" width="260" height="172" rx="4" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="3"/>

  <!-- ─── SCORE / HUD BAR ─── -->
  <text x="40" y="30" font-family="monospace" font-size="9" fill="#00e5ff" filter="url(#glow)" font-weight="bold" letter-spacing="1">SCORE</text>
  <text x="80" y="30" font-family="monospace" font-size="9" fill="#ffffff" filter="url(#glow)" font-weight="bold">08450</text>
  <text x="145" y="30" font-family="monospace" font-size="9" fill="#ff2d78" filter="url(#glow)" font-weight="bold" letter-spacing="1" text-anchor="middle">HEALTH SHIELD</text>
  <text x="220" y="30" font-family="monospace" font-size="9" fill="#00e5ff" filter="url(#glow)" font-weight="bold" letter-spacing="1">LIVES</text>
  <!-- Life hearts -->
  <text x="256" y="30" font-family="monospace" font-size="9" fill="#ff2d78" filter="url(#glow)" font-weight="bold">❤ ❤</text>

  <!-- ─── HUD SEPARATOR LINE ─── -->
  <line x1="30" y1="34" x2="290" y2="34" stroke="rgba(0,229,255,0.3)" stroke-width="0.5"/>

  <!-- ─── BRICK ROWS (Atari style – 8 per row, 6 rows) ─── -->
  <!-- Row 1 – Total Shield (pink) -->
  <rect x="32" y="38" width="30" height="8" rx="1" fill="url(#brick1)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="64" y="38" width="30" height="8" rx="1" fill="url(#brick1)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="96" y="38" width="30" height="8" rx="1" fill="url(#brick1)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <!-- gap (already broken brick) -->
  <rect x="160" y="38" width="30" height="8" rx="1" fill="url(#brick1)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="192" y="38" width="30" height="8" rx="1" fill="url(#brick1)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="224" y="38" width="30" height="8" rx="1" fill="url(#brick1)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="256" y="38" width="30" height="8" rx="1" fill="url(#brick1)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <!-- Brick highlight sheen -->
  <rect x="32" y="38" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="64" y="38" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="38" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="38" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="192" y="38" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="224" y="38" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="256" y="38" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>

  <!-- Row 2 – Cancer Care (orange) -->
  <rect x="32" y="48" width="30" height="8" rx="1" fill="url(#brick2)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="64" y="48" width="30" height="8" rx="1" fill="url(#brick2)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="96" y="48" width="30" height="8" rx="1" fill="url(#brick2)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="128" y="48" width="30" height="8" rx="1" fill="url(#brick2)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="160" y="48" width="30" height="8" rx="1" fill="url(#brick2)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="192" y="48" width="30" height="8" rx="1" fill="url(#brick2)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <!-- gap -->
  <rect x="256" y="48" width="30" height="8" rx="1" fill="url(#brick2)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="32" y="48" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="64" y="48" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="48" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="128" y="48" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="48" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="192" y="48" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="256" y="48" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>

  <!-- Row 3 – Critical Illness (yellow) -->
  <rect x="32" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="64" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="96" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="128" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="160" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="192" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="224" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="256" y="58" width="30" height="8" rx="1" fill="url(#brick3)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="32" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="64" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="128" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="192" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="224" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="256" y="58" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>

  <!-- Row 4 – Surgery (green) -->
  <rect x="32" y="68" width="30" height="8" rx="1" fill="url(#brick4)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <!-- gap -->
  <rect x="96" y="68" width="30" height="8" rx="1" fill="url(#brick4)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="128" y="68" width="30" height="8" rx="1" fill="url(#brick4)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="160" y="68" width="30" height="8" rx="1" fill="url(#brick4)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="192" y="68" width="30" height="8" rx="1" fill="url(#brick4)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="224" y="68" width="30" height="8" rx="1" fill="url(#brick4)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="256" y="68" width="30" height="8" rx="1" fill="url(#brick4)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="32" y="68" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="68" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="128" y="68" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="68" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="192" y="68" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="224" y="68" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="256" y="68" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>

  <!-- Row 5 – Hospital (cyan) -->
  <rect x="32" y="78" width="30" height="8" rx="1" fill="url(#brick5)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="64" y="78" width="30" height="8" rx="1" fill="url(#brick5)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="96" y="78" width="30" height="8" rx="1" fill="url(#brick5)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="128" y="78" width="30" height="8" rx="1" fill="url(#brick5)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <!-- gap -->
  <rect x="192" y="78" width="30" height="8" rx="1" fill="url(#brick5)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="224" y="78" width="30" height="8" rx="1" fill="url(#brick5)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="256" y="78" width="30" height="8" rx="1" fill="url(#brick5)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="32" y="78" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="64" y="78" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="78" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="128" y="78" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="192" y="78" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="224" y="78" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="256" y="78" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>

  <!-- Row 6 – Emergency (purple) -->
  <rect x="32" y="88" width="30" height="8" rx="1" fill="url(#brick6)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="64" y="88" width="30" height="8" rx="1" fill="url(#brick6)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="96" y="88" width="30" height="8" rx="1" fill="url(#brick6)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="128" y="88" width="30" height="8" rx="1" fill="url(#brick6)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="160" y="88" width="30" height="8" rx="1" fill="url(#brick6)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="192" y="88" width="30" height="8" rx="1" fill="url(#brick6)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <!-- gap -->
  <rect x="256" y="88" width="30" height="8" rx="1" fill="url(#brick6)" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  <rect x="32" y="88" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="64" y="88" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="88" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="128" y="88" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="88" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="192" y="88" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="256" y="88" width="30" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>

  <!-- ─── BALL TRAIL (motion blur effect) ─── -->
  <circle cx="157" cy="125" r="3" fill="rgba(255,255,255,0.1)"/>
  <circle cx="161" cy="120" r="3.5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="165" cy="115" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="169" cy="110" r="4.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Ball (bright, glowing) -->
  <circle cx="173" cy="105" r="5" fill="white" filter="url(#strongGlow)"/>
  <circle cx="173" cy="105" r="5" fill="white"/>
  <circle cx="174.5" cy="103.5" r="1.8" fill="rgba(255,255,255,0.8)"/>

  <!-- Brick impact flash at row 1 gap (where brick was destroyed) -->
  <rect x="128" y="36" width="30" height="12" rx="2" fill="rgba(255,45,120,0.25)"/>
  <line x1="133" y1="38" x2="128" y2="34" stroke="rgba(255,100,150,0.6)" stroke-width="1"/>
  <line x1="143" y1="37" x2="142" y2="32" stroke="rgba(255,100,150,0.6)" stroke-width="1"/>
  <line x1="153" y1="38" x2="157" y2="33" stroke="rgba(255,100,150,0.6)" stroke-width="1"/>

  <!-- ─── PADDLE ─── -->
  <rect x="140" y="162" width="60" height="8" rx="4" fill="url(#paddleGrad)" stroke="rgba(0,229,255,0.6)" stroke-width="1"/>
  <!-- Paddle glow -->
  <rect x="140" y="162" width="60" height="8" rx="4" fill="none" filter="url(#glow)" stroke="rgba(0,229,255,0.8)" stroke-width="2"/>
  <!-- Paddle sheen -->
  <rect x="143" y="163" width="54" height="3" rx="2" fill="rgba(255,255,255,0.35)"/>

  <!-- ─── WALL / SIDE GUIDES ─── -->
  <rect x="30" y="36" width="2" height="130" fill="rgba(0,229,255,0.2)"/>
  <rect x="288" y="36" width="2" height="130" fill="rgba(0,229,255,0.2)"/>
  <rect x="30" y="36" width="260" height="2" fill="rgba(0,229,255,0.2)"/>

  <!-- ─── BOTTOM DANGER ZONE ─── -->
  <rect x="30" y="168" width="260" height="2" fill="rgba(255,45,120,0.3)"/>

  <!-- ─── SCANLINES OVERLAY (CRT effect) ─── -->
  <rect x="30" y="14" width="260" height="172" rx="4" fill="url(#scanlines)" opacity="0.5"/>

  <!-- ─── SCREEN GLARE ─── -->
  <ellipse cx="100" cy="50" rx="60" ry="30" fill="rgba(255,255,255,0.03)" transform="rotate(-20,100,50)"/>

  <!-- ─── CABINET LABEL BAR (bottom strip) ─── -->
  <rect x="26" y="192" width="268" height="6" rx="3" fill="rgba(191,90,242,0.3)" stroke="rgba(191,90,242,0.5)" stroke-width="0.5"/>
  <text x="160" y="197" font-family="monospace" font-size="5" fill="#c084fc" text-anchor="middle" letter-spacing="3" font-weight="bold">HEALTH SHIELD</text>
</svg>
